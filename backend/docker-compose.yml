version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: video_analytics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: video_analytics
      POSTGRES_USER: video_user
      POSTGRES_PASSWORD: video_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: video_analytics_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
